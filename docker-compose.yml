services:
  web:
    build:
      context: .
      target: production
    ports:
      - "8080:8080"
    restart: always

  dev:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev -- --host"
